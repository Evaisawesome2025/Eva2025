<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fruit Frenzy 🍓</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #1a1a2e; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W, H, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const FRUITS = ['🍓','🍎','🍊','🍌','🍇','🍉','🍑','🥝','🍒','🍍'];
  const BOMB = '💣';
  const GOLD = '⭐';

  // ---- state ----
  let state = 'menu';            // menu | playing | gameover
  let score, lives, combo, comboTimer, best;
  let items, particles, floaters;
  let spawnTimer, spawnInterval, speedMul, shake, time;
  best = +(localStorage.getItem('fruitFrenzyBest') || 0);

  const basket = { x: 0, w: 90, targetX: 0 };

  function reset() {
    score = 0; lives = 3; combo = 0; comboTimer = 0;
    items = []; particles = []; floaters = [];
    spawnTimer = 0; spawnInterval = 1.1; speedMul = 1; shake = 0; time = 0;
    basket.x = basket.targetX = W / 2;
  }

  // ---- input ----
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (state !== 'playing' && (e.key === ' ' || e.key === 'Enter')) start();
  });
  window.addEventListener('keyup', e => keys[e.key] = false);

  function pointTo(clientX) { basket.targetX = clientX; }
  window.addEventListener('mousemove', e => { if (state === 'playing') pointTo(e.clientX); });
  window.addEventListener('touchmove', e => { pointTo(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
  window.addEventListener('touchstart', e => {
    if (state !== 'playing') start();
    else pointTo(e.touches[0].clientX);
  });
  window.addEventListener('mousedown', () => { if (state !== 'playing') start(); });

  function start() { reset(); state = 'playing'; }

  // ---- spawning ----
  function spawn() {
    const r = Math.random();
    let type = 'fruit', emoji = FRUITS[(Math.random() * FRUITS.length) | 0];
    if (r < 0.14 && time > 5) { type = 'bomb'; emoji = BOMB; }
    else if (r < 0.20) { type = 'gold'; emoji = GOLD; }
    items.push({
      type, emoji,
      x: 40 + Math.random() * (W - 80),
      y: -40,
      vy: (130 + Math.random() * 90) * speedMul,
      drift: (Math.random() - 0.5) * 60,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 3,
      size: type === 'gold' ? 30 : 34
    });
  }

  // ---- effects ----
  function burst(x, y, color, n = 14) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, s = 60 + Math.random() * 220;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60, life: 0.7, maxLife: 0.7, color, r: 2 + Math.random() * 4 });
    }
  }
  function floatText(x, y, text, color) {
    floaters.push({ x, y, text, color, life: 1 });
  }

  const FRUIT_COLORS = { '🍓':'#ff4d6d','🍎':'#e63946','🍊':'#ff9f1c','🍌':'#ffd60a','🍇':'#9d4edd','🍉':'#2ec4b6','🍑':'#ffb4a2','🥝':'#80b918','🍒':'#d00000','🍍':'#ffba08' };

  // ---- update ----
  function update(dt) {
    time += dt;
    if (shake > 0) shake = Math.max(0, shake - dt * 30);

    // difficulty ramp
    speedMul = 1 + time * 0.022;
    spawnInterval = Math.max(0.38, 1.1 - time * 0.012);

    // basket movement
    const kspeed = 620 * dt;
    if (keys['ArrowLeft'] || keys['a']) basket.targetX -= kspeed;
    if (keys['ArrowRight'] || keys['d']) basket.targetX += kspeed;
    basket.targetX = Math.max(basket.w / 2, Math.min(W - basket.w / 2, basket.targetX));
    basket.x += (basket.targetX - basket.x) * Math.min(1, dt * 14);

    spawnTimer -= dt;
    if (spawnTimer <= 0) { spawn(); spawnTimer = spawnInterval; }

    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

    const basketY = H - 70;
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.y += it.vy * dt;
      it.x += it.drift * dt;
      it.rot += it.vr * dt;
      if (it.x < 20 || it.x > W - 20) it.drift *= -1;

      // catch check
      if (it.y > basketY - 20 && it.y < basketY + 30 && Math.abs(it.x - basket.x) < basket.w / 2 + 14) {
        items.splice(i, 1);
        if (it.type === 'bomb') {
          lives--;
          combo = 0;
          shake = 14;
          burst(it.x, it.y, '#ff3333', 26);
          floatText(it.x, it.y - 30, 'BOOM!', '#ff5555');
          if (lives <= 0) gameOver();
        } else if (it.type === 'gold') {
          combo++;
          comboTimer = 2.2;
          const pts = 50 * Math.max(1, combo);
          score += pts;
          burst(it.x, it.y, '#ffd700', 22);
          floatText(it.x, it.y - 30, '+' + pts + ' ⭐', '#ffd700');
        } else {
          combo++;
          comboTimer = 2.2;
          const pts = 10 * Math.max(1, combo);
          score += pts;
          burst(it.x, it.y, FRUIT_COLORS[it.emoji] || '#fff', 14);
          floatText(it.x, it.y - 30, '+' + pts + (combo > 1 ? '  x' + combo : ''), '#aaffaa');
        }
        continue;
      }

      // missed
      if (it.y > H + 40) {
        items.splice(i, 1);
        if (it.type === 'fruit') {
          lives--;
          combo = 0;
          shake = 8;
          floatText(it.x, H - 60, 'Missed!', '#ff8888');
          if (lives <= 0) gameOver();
        }
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      p.vy += 500 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }
    for (let i = floaters.length - 1; i >= 0; i--) {
      const f = floaters[i];
      f.life -= dt;
      f.y -= 50 * dt;
      if (f.life <= 0) floaters.splice(i, 1);
    }
  }

  function gameOver() {
    state = 'gameover';
    if (score > best) { best = score; localStorage.setItem('fruitFrenzyBest', best); }
  }

  // ---- draw ----
  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#16213e');
    g.addColorStop(1, '#0f3460');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // twinkly dots
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for (let i = 0; i < 40; i++) {
      const x = (i * 137.5) % W;
      const y = (i * 89.7 + time * 12) % H;
      ctx.fillRect(x, y, 2, 2);
    }
  }

  function drawBasket() {
    const y = H - 60;
    ctx.save();
    ctx.translate(basket.x, y);
    ctx.font = '52px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧺', 0, 0);
    ctx.restore();
  }

  function drawHUD() {
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.font = 'bold 26px system-ui, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('Score: ' + score, 16, 14);
    ctx.font = '24px serif';
    let hearts = '';
    for (let i = 0; i < lives; i++) hearts += '❤️';
    ctx.fillText(hearts, 16, 48);
    if (combo > 1) {
      ctx.textAlign = 'center';
      ctx.font = 'bold ' + Math.min(46, 22 + combo * 3) + 'px system-ui, sans-serif';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('COMBO x' + combo, W / 2, 16);
    }
    ctx.textAlign = 'right';
    ctx.font = '18px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText('Best: ' + best, W - 16, 18);
  }

  function drawCenteredScreen(title, lines) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + Math.min(64, W / 8) + 'px system-ui, sans-serif';
    ctx.fillText(title, W / 2, H * 0.32);
    ctx.font = '22px system-ui, sans-serif';
    lines.forEach((l, i) => {
      ctx.fillStyle = l.color || '#ddd';
      ctx.fillText(l.text, W / 2, H * 0.45 + i * 36);
    });
  }

  function draw() {
    ctx.save();
    if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    drawBackground();

    if (state === 'menu') {
      // floating demo fruit
      ctx.font = '40px serif';
      ctx.textAlign = 'center';
      for (let i = 0; i < 8; i++) {
        const x = (i + 0.5) * W / 8;
        const y = H * 0.78 + Math.sin(time * 2 + i) * 14;
        ctx.fillText(FRUITS[i % FRUITS.length], x, y);
      }
      drawCenteredScreen('🍓 Fruit Frenzy 🍉', [
        { text: 'Catch fruit in your basket. Don’t miss!' },
        { text: 'Avoid 💣 bombs  •  ⭐ = 50 points' },
        { text: 'Chain catches for combo multipliers!' },
        { text: '' },
        { text: 'Move: mouse / touch / arrow keys', color: '#aaa' },
        { text: 'Tap or press SPACE to start', color: '#ffd700' },
      ]);
    } else {
      for (const it of items) {
        ctx.save();
        ctx.translate(it.x, it.y);
        ctx.rotate(it.rot);
        ctx.font = it.size + 'px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(it.emoji, 0, 0);
        ctx.restore();
      }
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      for (const f of floaters) {
        ctx.globalAlpha = Math.max(0, f.life);
        ctx.fillStyle = f.color;
        ctx.font = 'bold 22px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(f.text, f.x, f.y);
      }
      ctx.globalAlpha = 1;
      drawBasket();
      drawHUD();

      if (state === 'gameover') {
        drawCenteredScreen('Game Over!', [
          { text: 'Score: ' + score, color: '#fff' },
          { text: score >= best && score > 0 ? '🏆 NEW BEST! 🏆' : 'Best: ' + best, color: '#ffd700' },
          { text: '' },
          { text: 'Tap or press SPACE to play again', color: '#aaa' },
        ]);
      }
    }
    ctx.restore();
  }

  // ---- loop ----
  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    if (state === 'playing') update(dt);
    else time += dt;
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
